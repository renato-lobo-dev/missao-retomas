<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Missão Retomas – Inscrição</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 15px 0;
      font-size: 1em;
    }

    button {
      padding: 14px;
      width: 100%;
      font-size: 1.1em;
      background: #0050aa;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .note {
      margin-top: 15px;
      font-size: 0.9em;
      color: #666;
    }
  </style>
</head>


<body>

  <div class="container">
    <h1>Missão Retomas</h1>
    <p>Inscrição da equipa</p>

    <input
      type="text"
      id="teamName"
      placeholder="Nome da equipa"
      autocomplete="off"
    >

    <button id="entrarBtn">Entrar no jogo</button>
  </div>
  <script type="module" src="index.js"></script>

</body>
</html>
