<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Missão Retomas – Equipa</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 16px;
    }

    .container {
      max-width: 420px;
      margin: auto;
      background: #ffffff;
      padding: 16px;
      border-radius: 8px;
    }

    h1, h2 {
      text-align: center;
    }

    
.score {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  margin: 16px 0;
}

.score-item {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 10px;
  background: #f5f6f8;
}

.score-item .icon svg {
  width: 30px;
  height: 30px;
  opacity: 0.8;
}

.score-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
}

.score-text .label {
  font-size: 0.75rem;
  text-transform: uppercase;
  color: #666;
  letter-spacing: 0.04em;
}

.score-text .value {
  font-size: 1.4rem;
  font-weight: 700;
}

/* Diferenciação suave */
.score-item.business {
  border-left: 4px solid #0050aa;
}

.score-item.customer {
  border-left: 4px solid #2fa84f;
}


    .question {
      margin: 16px 0;
      font-size: 1.1em;
    }

    .options button,
    .risk button {
      width: 100%;
      margin: 6px 0;
      padding: 12px;
      font-size: 1em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .options button {
      background: #0050aa;
      color: white;
    }

    .risk button {
      background: #777;
      color: white;
    }

    .confirm {
      margin-top: 16px;
      padding: 14px;
      width: 100%;
      font-size: 1.1em;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .status {
      margin-top: 16px;
      text-align: center;
      color: #666;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- IDENTIDADE DA EQUIPA -->
    <h1>Missão Retomas</h1>
    <h2 id="teamName">Equipa</h2>

    <!-- PONTUAÇÃO -->

    <div class="score">
      <div class="score-item business">
        <div class="icon">
          <!-- SVG Negócio -->
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M4 9V7.2C4 6.0799 4 5.51984 4.21799 5.09202C4.40973 4.71569 4.71569 4.40973 5.09202 4.21799C5.51984 4 6.07989 4 7.2 4H16.8C17.9201 4 18.4802 4 18.908 4.21799C19.2843 4.40973 19.5903 4.71569 19.782 5.09202C20 5.51984 20 6.0799 20 7.2V16.8C20 17.9201 20 18.4802 19.782 18.908C19.5903 19.2843 19.2843 19.5903 18.908 19.782C18.4802 20 17.9201 20 16.8 20H10.5M11 16H17M8 11L11 9V12L17 7M17 7H14M17 7V10M7 14.5C6.5 14.376 5.68509 14.3714 5 14.376C4.77091 14.3775 4.90941 14.3678 4.6 14.376C3.79258 14.4012 3.00165 14.7368 3 15.6875C2.99825 16.7004 4 17 5 17C6 17 7 17.2312 7 18.3125C7 19.1251 6.1925 19.4812 5.1861 19.5991C4.3861 19.5991 4 19.625 3 19.5M5 20V21M5 13V14" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path> </g></svg>
        </div>
        <div class="score-text">
          <span class="label">Negócio</span>
          <span class="value" id="pontosNegocio">100</span>
        </div>
      </div>

      <div class="score-item customer">
        <div class="icon">
          <!-- SVG Cliente -->
          <svg fill="#000000" viewBox="0 0 36 36" version="1.1" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <title>happy-face-line</title> <path d="M18,2A16,16,0,1,0,34,18,16,16,0,0,0,18,2Zm0,30A14,14,0,1,1,32,18,14,14,0,0,1,18,32Z" class="clr-i-outline clr-i-outline-path-1"></path><circle cx="10.89" cy="13.89" r="2" class="clr-i-outline clr-i-outline-path-2"></circle><circle cx="25.05" cy="13.89" r="2" class="clr-i-outline clr-i-outline-path-3"></circle><path d="M18.13,28.21a8.67,8.67,0,0,0,8.26-6H9.87A8.67,8.67,0,0,0,18.13,28.21Z" class="clr-i-outline clr-i-outline-path-4"></path> <rect x="0" y="0" width="36" height="36" fill-opacity="0"></rect> </g></svg>
        </div>
        <div class="score-text">
          <span class="label">Cliente</span>
          <span class="value" id="pontosCliente">100</span>
        </div>
      </div>
    </div>

    <!-- ESTADO DA RONDA -->
    <div class="status" id="roundStatus">
      Aguardando a próxima ronda…
    </div>

    <!-- PERGUNTA -->
    <div class="question" id="pergunta">
      <!-- Texto da pergunta aparece aqui -->
    </div>

    <!-- OPÇÕES -->
    <div class="options" id="opcoes">
      <button data-opcao="A">Opção A</button>
      <button data-opcao="B">Opção B</button>
      <button data-opcao="C">Opção C</button>
    </div>

    <!-- RISCO -->
    <h3>Escolhe o risco</h3>
    <div class="risk">
      <button data-risco="1">🟢 Seguro</button>
      <button data-risco="2">🟡 Arriscado</button>
      <button data-risco="all">🔴 Tudo ou Nada</button>
    </div>

    <!-- CONFIRMAR -->
    <button class="confirm" id="confirmar">
      Confirmar decisão
    </button>

    <div class="status" id="feedback">
      <!-- Feedback após resposta -->
    </div>

  </div>
<script type="module" src="equipa.js"></script>
</body>
</html>
