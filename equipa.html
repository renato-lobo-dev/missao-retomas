<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Missão Retomas – Equipa</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 16px;
    }

    .container {
      max-width: 420px;
      margin: auto;
      background: #ffffff;
      padding: 16px;
      border-radius: 8px;
    }

    h1, h2 {
      text-align: center;
    }

    .score {
      display: flex;
      justify-content: space-between;
      margin: 16px 0;
      padding: 12px;
      background: #eee;
      border-radius: 6px;
      font-weight: bold;
    }

    .question {
      margin: 16px 0;
      font-size: 1.1em;
    }

    .options button,
    .risk button {
      width: 100%;
      margin: 6px 0;
      padding: 12px;
      font-size: 1em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .options button {
      background: #0050aa;
      color: white;
    }

    .risk button {
      background: #777;
      color: white;
    }

    .confirm {
      margin-top: 16px;
      padding: 14px;
      width: 100%;
      font-size: 1.1em;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .status {
      margin-top: 16px;
      text-align: center;
      color: #666;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- IDENTIDADE DA EQUIPA -->
    <h1>Missão Retomas</h1>
    <h2 id="teamName">Equipa</h2>

    <!-- PONTUAÇÃO -->
    <div class="score">
      <div>💰 Negócio: <span id="pontosNegocio">100</span></div>
      <div>🙂 Cliente: <span id="pontosCliente">100</span></div>
    </div>

    <!-- ESTADO DA RONDA -->
    <div class="status" id="roundStatus">
      Aguardando a próxima ronda…
    </div>

    <!-- PERGUNTA -->
    <div class="question" id="pergunta">
      <!-- Texto da pergunta aparece aqui -->
    </div>

    <!-- OPÇÕES -->
    <div class="options" id="opcoes">
      <button data-opcao="A">Opção A</button>
      <button data-opcao="B">Opção B</button>
      <button data-opcao="C">Opção C</button>
    </div>

    <!-- RISCO -->
    <h3>Escolhe o risco</h3>
    <div class="risk">
      <button data-risco="1">🟢 Seguro</button>
      <button data-risco="2">🟡 Arriscado</button>
      <button data-risco="all">🔴 Tudo ou Nada</button>
    </div>

    <!-- CONFIRMAR -->
    <button class="confirm" id="confirmar">
      Confirmar decisão
    </button>

    <div class="status" id="feedback">
      <!-- Feedback após resposta -->
    </div>

  </div>


<script type="module" src="base.js"></script>
<script type="module" src="equipa.js"></script>
</body>
</html>
