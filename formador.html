<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Missão Retomas – Formador</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .controls {
      margin-bottom: 20px;
    }

    .controls button {
      padding: 12px 18px;
      margin-right: 10px;
      font-size: 1em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .open { background: #28a745; color: white; }
    .next { background: #2a13fd; color: white; }
    .reset { background: #ffffff; color: #000; }

    
    .question-panel {
      display: block;
      background: #ffffff;
      color: #1f2933;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }


    #perguntaAtualTexto {
      color: #1f2933;
    }

    #solucao {
      background: #f5f6f8;
      color: #1f2933;
      margin-top: 16px;
      padding: 14px;
      border-left: 4px solid #0050aa;
      border-radius: 6px;
    }

    .explicacao { color: #333; }
    .hidden { display: none; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }

    .team {
      background: #222;
      padding: 12px;
      border-radius: 6px;
    }

    .team strong {
      display: block;
      font-size: 1.1em;
      margin-bottom: 6px;
    }
  </style>
</head>

<body>

  <h1>Missão Retomas – Controlo do Formador</h1>

  <div class="controls">
    <button class="open" id="abrirRonda">Abrir ronda</button>
    <button class="next" id="proximaPergunta">Próxima pergunta</button>
    <button class="reset" id="resetJogo">Reset jogo</button>
  </div>

  <div class="question-panel">
  <h2 id="perguntaAtualTexto">Pergunta:</h2>

  <div id="solucao" class="hidden">
    <p><strong>Resposta correta:</strong>
      <span id="respostaCorreta"></span>
    </p>
    <p class="explicacao" id="explicacaoResposta"></p>
  </div>
</div>

  <button id="fecharPergunta">Fechar pergunta</button>

  <div class="grid" id="equipas"></div>

<script type="module" src="formador.js"></script>

</body>
</html>
