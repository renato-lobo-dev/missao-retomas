<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Missão Retomas – Formador</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .controls {
      margin-bottom: 20px;
    }

    .controls button {
      padding: 12px 18px;
      margin-right: 10px;
      font-size: 1em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .open {
      background: #28a745;
      color: white;
    }

    .close {
      background: #dc3545;
      color: white;
    }

    .question-box {
      background: #222;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 1.3em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }

    .team {
      background: #222;
      padding: 12px;
      border-radius: 6px;
    }

    .team strong {
      display: block;
      font-size: 1.1em;
      margin-bottom: 6px;
    }
  </style>
</head>

<body>

  <h1>🎮 Missão Retomas – Controlo do Formador</h1>

  <!-- CONTROLOS -->
  <div class="controls">
    <button class="open" id="abrirRonda">▶️ Desbloquear próxima ronda</button>
    <button class="close" id="fecharRonda">⛔ Encerrar ronda</button>
  </div>

  <!-- PERGUNTA ATUAL -->
  <div class="question-box" id="perguntaAtual">
    Pergunta atual aparecerá aqui
  </div>

  <!-- RANKING / ESTADO DAS EQUIPAS -->
  <div class="grid" id="equipas">
    
  </div>
  
<script type="module" src="pe="module" src="formador.js"></scrip
<script src="base.js"></script>
<script src="formador.js"></script>
</body>
</html>
